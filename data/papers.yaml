  title: "The Costs of Simplicity: Why Multilevel Models May Benefit from Accounting for Cross-Cluster Differences in the Effects of Controls"
  finding: "Most multilevel studies in leading journals assume control variable effects are invariant across clusters — an assumption that is often implausible and that reduces the precision of estimated context effects when it fails."
