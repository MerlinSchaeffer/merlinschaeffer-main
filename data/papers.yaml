  title: "The Integration Paradox: Does Awareness of the Extent of Ethno-Racial Discrimination Increase Reports of Discrimination?"
  finding: "A preregistered survey experiment in Germany provides the first causal evidence for the awareness mechanism behind the integration paradox: informing immigrants about discrimination against their group raises their personal reports of being discriminated against."
