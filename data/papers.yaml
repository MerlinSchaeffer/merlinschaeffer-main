  title: "Local Communities, Distant Origins: How Cultural Distance and Local Context Shape Immigrant Ethno-Religious Infrastructures"
  finding: "Across 54 immigrant minorities in Germany, organizational density — mosques, associations, minority-owned businesses — is predicted primarily by cultural distance from the host society, not by local context, community homogeneity, or reactive group formation as prevailing theories suggest."
