  title: "Contested Boundaries: Explaining Where Ethnoracial Diversity Provokes Neighborhood Conflict"
  finding: "Based on 4.7 million 311 service requests from New York City, neighborhood conflict is highest not in the most diverse areas but at \"fuzzy boundaries\" — interstitial zones between homogeneous enclaves, identified using edge detection algorithms from computer vision."
