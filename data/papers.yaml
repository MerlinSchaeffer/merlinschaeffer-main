  title: "Ethnic Diversity and Social Trust: A Narrative and Meta-Analytical Review"
  finding: "A meta-analysis of 1,001 estimates from 87 studies confirms a statistically significant negative relationship between ethnic diversity and social trust — strongest for trust in neighbours and at local spatial scales, and robust to covariate conditioning."
